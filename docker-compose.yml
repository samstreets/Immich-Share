services:
  immich-share:
    image: samuelstreets/immich-share:latest
    # Or build locally:
    # build: .
    container_name: immich-share
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - immich-share-data:/app/data
    environment:
      # ── Required ─────────────────────────────────────────────────────────
      NODE_ENV: production
      # URL of your Immich server (can also be set in Admin → Settings)
      IMMICH_URL:
      # Immich API key (can also be set in Admin → Settings)
      IMMICH_API_KEY:

      # ── Recommended ───────────────────────────────────────────────────────
      # Public-facing URL of THIS app — used to build share links
      EXTERNAL_URL: http://localhost:3000
      # Change this! Used to sign admin JWT tokens
      JWT_SECRET: change-me-to-a-long-random-string
      # Default admin password (only used on first run)
      ADMIN_PASSWORD: admin

      # ── Optional ──────────────────────────────────────────────────────────
      PORT: 3000
      DB_PATH: /app/data/app.db

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  immich-share-data:
    driver: local
