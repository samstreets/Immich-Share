services:
  immich-share:
    image: samuelstreets/immich-share:latest
    # Or build locally:
    # build: .
    container_name: immich-share
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - immich-share-data:/app/data
    environment:
      NODE_ENV: production

      # ── Required ────────────────────────────────────────────────────────────
      # Change this! Used to sign admin JWT tokens.
      JWT_SECRET: change-me-to-a-long-random-string

      # ── Optional ────────────────────────────────────────────────────────────
      # Default admin password (only used on very first run, before the DB exists)
      ADMIN_PASSWORD: admin

      PORT: 3000
      DB_PATH: /app/data/app.db

      # ── Legacy first-boot seeding (optional) ────────────────────────────────
      # Set these to pre-populate the Settings UI on first boot only.
      # After first boot, configure everything via Admin → Settings.
      # IMMICH_URL: http://192.168.1.100:2283
      # IMMICH_API_KEY: your-api-key-here
      # EXTERNAL_URL: https://share.yourdomain.com

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  immich-share-data:
    driver: local